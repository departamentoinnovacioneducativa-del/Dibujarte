<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Luna Min - ¡Dibuja y Colorea!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Bubblegum+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Pantalla de Inicio (Imagen + Corazón Palpitante) -->
<div id="welcomeModal" class="welcome-modal">
  <img src="portada.png" alt="Portada" class="welcome-bg-img">
  <div class="welcome-heart" id="startBtn">
    <i class="fa-solid fa-heart"></i>
    <span class="tap-text">¡Toca!</span>
  </div>
</div>

<div class="app-container">
  
  <!-- Banner -->
  <header class="app-header">
    <img src="Min.png" alt="Banner Luna Min" class="banner-img">
  </header>

  <!-- Colores y Pegatinas -->
  <div class="palette-container">
    <div id="colorGrid" class="color-row"></div>
    <div id="stickerGrid" class="sticker-row"></div>
  </div>

  <!-- Herramientas -->
  <div class="toolbar-container">
    <button class="tool-btn active" data-tool="brush" data-name="Pincel">
      <i class="fa-solid fa-paintbrush"></i><span class="tool-name">Pincel</span>
    </button>
    <button class="tool-btn" data-tool="bucket" data-name="Cubo">
      <i class="fa-solid fa-fill-drip"></i><span class="tool-name">Cubo</span>
    </button>
    <button class="tool-btn" data-tool="sticker" data-name="Pegatinas">
      <i class="fa-solid fa-face-smile"></i><span class="tool-name">Gomas</span>
    </button>
    <button class="tool-btn" data-tool="eraser" data-name="Borrar">
      <i class="fa-solid fa-eraser"></i><span class="tool-name">Borrar</span>
    </button>
    <div class="size-control">
      <div id="sizePreview" class="size-preview"></div>
      <input type="range" id="sizeSlider" class="size-slider" min="5" max="80" value="15">
    </div>
  </div>

  <!-- Lienzo -->
  <div class="canvas-container">
    <canvas id="paintCanvas" width="900" height="600"></canvas>
  </div>

  <!-- Botones de Acción -->
  <div class="action-bar">
    <button id="undoBtn" class="main-btn btn-undo"><i class="fa-solid fa-rotate-left"></i></button>
    <button id="newCanvasBtn" class="main-btn btn-new"><i class="fa-solid fa-trash"></i></button>
    
    <button id="uploadBtn" class="main-btn-text btn-upload">
      <i class="fa-solid fa-cloud-arrow-up"></i><span>Subir</span>
    </button>
    <input type="file" id="imageLoader" accept="image/png, image/jpeg" style="display:none">
    
    <button id="downloadBtn" class="main-btn-text btn-save">
      <i class="fa-solid fa-download"></i><span>Guardar</span>
    </button>
    
    <button id="fireworksBtn" class="main-btn btn-fireworks"><i class="fa-solid fa-fire"></i></button>
    <button id="balloonsBtn" class="main-btn btn-balloons"><i class="fa-solid fa-circle-up"></i></button>
  </div>

  <!-- Galería -->
  <div class="gallery-bar">
    <div id="categoryTabs" class="category-tabs">
      <button class="category-tab active" data-cat="animales">🐾</button>
      <button class="category-tab" data-cat="naturaleza">🌳</button>
      <button class="category-tab" data-cat="vehiculos">🚗</button>
      <button class="category-tab" data-cat="cosas">🧸</button>
      <button class="category-tab" data-cat="comida">🍕</button>
    </div>
    <div id="templatesGrid" class="templates-scroll"></div>
  </div>
</div>

<div id="toast" class="toast"></div>
<div id="effectsLayer" class="effects-layer"></div>

<script src="script.js"></script>
</body>
</html>
