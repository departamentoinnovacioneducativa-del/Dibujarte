<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinturitas - ¡Dibuja y Colorea!</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Bubblegum+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="text-gray-800">

<!-- Fondos decorativos -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- Header -->
<header class="relative z-20 pt-4 pb-2 px-4 md:px-6">
  <div class="max-w-[1800px] mx-auto flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <div class="logo-icon text-5xl">🎨</div>
      <h1 class="font-bubble text-4xl md:text-5xl text-pink-500">Pinturitas</h1>
    </div>
    <div class="flex items-center gap-2 md:gap-3">
      <button id="undoBtn" class="main-btn btn-undo"><i class="fa-solid fa-rotate-left"></i><span class="hidden sm:inline">Deshacer</span></button>
      <button id="newCanvasBtn" class="main-btn btn-new"><i class="fa-solid fa-trash"></i><span class="hidden sm:inline">Limpiar</span></button>
      <button id="uploadBtn" class="main-btn btn-upload"><i class="fa-solid fa-cloud-arrow-up"></i><span class="hidden sm:inline">Subir</span></button>
      <input type="file" id="imageLoader" accept="image/png, image/jpeg" style="position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0;">
      <button id="downloadBtn" class="main-btn btn-save"><i class="fa-solid fa-download"></i><span class="hidden sm:inline">Guardar</span></button>
    </div>
  </div>
</header>

<!-- Main -->
<main class="relative z-10 px-2 md:px-4 pb-4">
  <div class="max-w-[1800px] mx-auto grid grid-cols-1 lg:grid-cols-[40px_1fr_40px] gap-0 main-layout">
    
    <!-- Lápices Izquierda (Asomando) -->
    <aside class="pencil-sidebar hidden lg:flex flex-col items-center justify-center gap-4">
      <div id="leftPencils" class="flex flex-col gap-4"></div>
    </aside>

    <!-- Centro (Lienzo Gigante) -->
    <div class="flex flex-col gap-3 px-0 md:px-2">
      
      <!-- Barra de Herramientas -->
      <div class="panel p-2 flex items-center justify-center gap-2 relative">
        <button class="tool-btn active" data-tool="brush" data-name="Pincel">
          <i class="fa-solid fa-paintbrush"></i><span class="tool-name">Pincel</span>
        </button>
        <button class="tool-btn" data-tool="bucket" data-name="Cubo">
          <i class="fa-solid fa-fill-drip"></i><span class="tool-name">Cubo</span>
        </button>
        <button class="tool-btn" data-tool="sticker" data-name="Pegatinas">
          <i class="fa-solid fa-face-smile"></i><span class="tool-name">Gomas</span>
        </button>
        <button class="tool-btn" data-tool="eraser" data-name="Borrar">
          <i class="fa-solid fa-eraser"></i><span class="tool-name">Borrar</span>
        </button>
        
        <div class="w-px h-16 bg-yellow-200 mx-1 hidden md:block"></div>
        
        <div class="flex items-center gap-2 px-2">
          <div class="w-12 h-12 rounded-full bg-yellow-50 border-2 border-yellow-300 flex items-center justify-center">
            <div id="sizePreview" class="rounded-full transition-all" style="width: 12px; height: 12px; background: #FF6B6B;"></div>
          </div>
          <input type="range" id="sizeSlider" class="size-slider w-24 md:w-32" min="5" max="80" value="15">
        </div>

        <!-- Panel de Pegatinas -->
        <div id="stickerPanel" class="absolute top-full mt-2 left-1/2 -translate-x-1/2 bg-white p-3 rounded-2xl shadow-xl border-4 border-pink-300 grid grid-cols-6 gap-2 z-30 hidden">
          <div class="sticker-btn active" data-sticker="⭐">⭐</div>
          <div class="sticker-btn" data-sticker="❤️">❤️</div>
          <div class="sticker-btn" data-sticker="😊">😊</div>
          <div class="sticker-btn" data-sticker="🐶">🐶</div>
          <div class="sticker-btn" data-sticker="🐱">🐱</div>
          <div class="sticker-btn" data-sticker="🌸">🌸</div>
          <div class="sticker-btn" data-sticker="🍎">🍎</div>
          <div class="sticker-btn" data-sticker="🚗">🚗</div>
          <div class="sticker-btn" data-sticker="🎈">🎈</div>
          <div class="sticker-btn" data-sticker="👑">👑</div>
          <div class="sticker-btn" data-sticker="🌈">🌈</div>
          <div class="sticker-btn" data-sticker="🦄">🦄</div>
        </div>
      </div>
      
      <!-- Canvas -->
      <div class="canvas-wrapper">
        <canvas id="paintCanvas" width="900" height="650"></canvas>
      </div>
    </div>

    <!-- Lápices Derecha (Asomando) -->
    <aside class="pencil-sidebar hidden lg:flex flex-col items-center justify-center gap-4">
      <div id="rightPencils" class="flex flex-col gap-4"></div>
    </aside>

    <!-- Lápices Móvil (Abajo) -->
    <div class="lg:hidden flex justify-center gap-1 flex-wrap p-2 bg-white rounded-xl shadow-md mt-3">
      <div id="mobilePencils" class="flex gap-2 flex-wrap justify-center"></div>
    </div>
  </div>

  <!-- Galería Inferior -->
  <div class="max-w-[1800px] mx-auto panel p-3 mt-3">
    <div class="flex items-center justify-between gap-2 mb-2 flex-wrap">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-images text-xl text-pink-500"></i>
        <h3 class="font-bold text-base md:text-lg text-gray-700">Elige tu dibujo</h3>
      </div>
      <div class="flex flex-wrap gap-1" id="categoryTabs">
        <button class="category-tab active" data-cat="animales">🐾</button>
        <button class="category-tab" data-cat="naturaleza">🌳</button>
        <button class="category-tab" data-cat="vehiculos">🚗</button>
        <button class="category-tab" data-cat="cosas">🧸</button>
        <button class="category-tab" data-cat="comida">🍕</button>
      </div>
    </div>
    <div id="templatesGrid" class="grid grid-flow-col auto-cols-[90px] sm:auto-cols-[120px] gap-2 overflow-x-auto scroll-pretty pb-2"></div>
  </div>
</main>

<div id="toast" class="toast"></div>

<footer class="relative z-10 text-center py-2 text-gray-500 text-xs">
  <p>Hecho con <i class="fa-solid fa-heart text-pink-400"></i> para pequeños artistas</p>
</footer>

<script src="script.js"></script>
</body>
</html>
